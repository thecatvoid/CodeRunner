name: Build and Release APK

on:
  push:
    branches:
      - main  # Trigger action on push to main branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v2

      # Step 2: Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'

      # Step 3: Set up Android SDK
      - name: Set up Android SDK
        run: |
          echo "Installing Android SDK"
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk sdkmanager
          yes | sudo sdkmanager --licenses
          sudo sdkmanager "platform-tools" "build-tools;30.0.3" "android-30"
          sudo chown -R $USER:$USER /opt/android-sdk


      # Step 4: Build the APK
      - name: Build APK
        run: ./gradlew build

      # Step 5: Upload the APK as a GitHub Release
      - name: Create GitHub Release
        id: release
        run: |
          TAG_NAME="v$(date +'%Y%m%d%H%M%S')"  # You can change this to your versioning scheme
          gh release create $TAG_NAME app/build/outputs/apk/debug/app-debug.apk \
            --title "Release $TAG_NAME" \
            --notes "Release version $TAG_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}